<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Segmento UI Package — Demo</title>
  <script type="importmap">
    {
      "imports": {
        "@segmento/core": "https://esm.sh/@segmento/core",
        "@segmento/waitlist-ui": "https://esm.sh/@segmento/waitlist-ui"
      }
    }
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 16px;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    p {
      color: #666;
      font-size: 14px;
      margin: 0;
    }

    button {
      padding: 12px 28px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #6d28d9;
    }
  </style>
</head>

<body>
  <h1>Segmento UI Demo</h1>
  <p>Uses <code>@segmento/waitlist-ui</code> — modal is a shadow-DOM custom element</p>
  <button id="open-btn">Open Referral Modal</button>

  <script type="module">
    import { SegmentoClient } from "@segmento/core";
    import { defineSegmentoModal, SegmentoModal } from "@segmento/waitlist-ui";

    // Initialise once — stored globally, picked up automatically by any modal
    const TOKEN = "eyJ2IjoxLCJwaWQiOiJ0ZXN0LXByb2plY3QiLCJuYW1lIjoidGVzdCBwcm9qZWN0IiwiY2hrIjoiZmZjYjQzNDUifQ";
    SegmentoClient.init(TOKEN);

    // Register the custom element and configure required fields
    defineSegmentoModal({ telegramRequired: true, walletRequired: true });

    const modal = new SegmentoModal({
      onSuccess: () => {
        setTimeout(() => modal.close(), 1500);
      },
    });

    document.getElementById("open-btn").addEventListener("click", () => modal.open());
  </script>
</body>

</html>
